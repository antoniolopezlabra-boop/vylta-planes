<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect — captura rutas limpias como /karen-nails
    const slug = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
    if (slug && slug !== 'book.html') {
      window.location.replace('/book.html?n=' + encodeURIComponent(slug));
    } else {
      window.location.replace('/book.html');
    }
  </script>
</head>
<body></body>
</html>
