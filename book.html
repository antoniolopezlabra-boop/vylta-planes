<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendar cita</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFC; color: #0F172A; min-height: 100vh; }

    .loader { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #E2E8F0; border-top-color: #10B981; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .loader-text { font-size: 14px; color: #94A3B8; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 32px; text-align: center; gap: 12px; }
    .error-icon { font-size: 48px; }
    .error-title { font-size: 20px; font-weight: 700; color: #0F172A; }
    .error-desc { font-size: 14px; color: #64748B; line-height: 1.7; max-width: 320px; }

    .container { max-width: 480px; margin: 0 auto; padding: 0 16px 80px; }

    .biz-header { background: #fff; border-radius: 20px; padding: 24px; margin: 20px 0 16px; text-align: center; border: 1px solid #F1F5F9; }
    .biz-logo { width: 72px; height: 72px; border-radius: 18px; background: #10B981; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; color: #fff; margin: 0 auto 12px; overflow: hidden; }
    .biz-logo img { width: 100%; height: 100%; object-fit: cover; }
    .biz-name { font-size: 22px; font-weight: 800; color: #0F172A; }
    .biz-type { font-size: 14px; color: #64748B; margin-top: 4px; }
    .biz-badge { display: inline-flex; align-items: center; gap: 6px; background: #ECFDF5; color: #10B981; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-top: 8px; }
    .biz-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #10B981; }

    .section-title { font-size: 13px; font-weight: 700; color: #64748B; text-transform: uppercase; letter-spacing: 0.8px; margin: 20px 0 10px; }
    .card { background: #fff; border-radius: 16px; border: 1px solid #F1F5F9; overflow: hidden; margin-bottom: 16px; }

    .service-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid #F8FAFC; }
    .service-item:last-child { border-bottom: none; }
    .service-item:hover { background: #F8FAFC; }
    .service-item.selected { background: #ECFDF5; }
    .service-icon { width: 40px; height: 40px; border-radius: 12px; background: #F1F5F9; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .service-item.selected .service-icon { background: #D1FAE5; }
    .service-info { flex: 1; }
    .service-name { font-size: 15px; font-weight: 600; color: #0F172A; }
    .service-meta { font-size: 12px; color: #94A3B8; margin-top: 2px; }
    .service-price { font-size: 16px; font-weight: 800; color: #10B981; }
    .service-check { width: 22px; height: 22px; border-radius: 50%; background: #10B981; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; flex-shrink: 0; }

    .date-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #F8FAFC; }
    .date-label { font-size: 15px; font-weight: 600; color: #0F172A; }
    .date-btn { width: 32px; height: 32px; border-radius: 10px; border: 1px solid #E2E8F0; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: #64748B; }
    .date-btn:hover { background: #F8FAFC; }
    .date-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .closed-banner { padding: 20px 16px; text-align: center; color: #94A3B8; font-size: 14px; }

    .slots-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 14px 16px; }
    .slot { padding: 10px 4px; border-radius: 10px; border: 1px solid #E2E8F0; text-align: center; font-size: 13px; font-weight: 600; color: #0F172A; cursor: pointer; transition: all 0.15s; }
    .slot:hover { border-color: #10B981; color: #10B981; }
    .slot.selected { background: #10B981; border-color: #10B981; color: #fff; }
    .slot.taken { background: #F8FAFC; color: #CBD5E1; cursor: not-allowed; text-decoration: line-through; }
    .slots-empty { padding: 20px 16px; text-align: center; color: #94A3B8; font-size: 14px; }

    .form-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .form-field label { display: block; font-size: 12px; font-weight: 600; color: #64748B; margin-bottom: 6px; }
    .form-field input, .form-field textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #E2E8F0; border-radius: 12px; font-size: 15px; color: #0F172A; background: #fff; font-family: inherit; transition: border-color 0.15s; outline: none; }
    .form-field input:focus, .form-field textarea:focus { border-color: #10B981; }
    .form-field textarea { resize: none; height: 80px; }

    .summary { background: #0F172A; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .summary-row:last-child { margin-bottom: 0; padding-top: 8px; border-top: 1px solid #1E293B; }
    .summary-key { font-size: 12px; color: #64748B; }
    .summary-val { font-size: 13px; font-weight: 600; color: #F8FAFC; }
    .summary-price { font-size: 18px; font-weight: 800; color: #10B981; }

    .submit-btn { width: 100%; padding: 18px; background: #10B981; color: #fff; border: none; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .success-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; text-align: center; gap: 16px; }
    .success-icon { width: 80px; height: 80px; border-radius: 50%; background: #ECFDF5; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .success-title { font-size: 24px; font-weight: 800; color: #0F172A; }
    .success-desc { font-size: 15px; color: #64748B; line-height: 1.7; max-width: 320px; }
    .success-card { background: #fff; border-radius: 16px; border: 1px solid #F1F5F9; padding: 20px; width: 100%; max-width: 360px; text-align: left; }
    .success-card-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F8FAFC; font-size: 14px; }
    .success-card-row:last-child { border-bottom: none; }
    .success-card-key { color: #94A3B8; }
    .success-card-val { font-weight: 600; color: #0F172A; }
    .whatsapp-hint { background: #F0FDF4; border-radius: 12px; padding: 14px 16px; font-size: 13px; color: #10B981; font-weight: 500; max-width: 360px; width: 100%; }
    .powered { text-align: center; padding: 24px; font-size: 12px; color: #CBD5E1; }
    .powered span { font-weight: 700; color: #10B981; }
  </style>
</head>
<body>
<div id="app">
  <div class="loader"><div class="spinner"></div><span class="loader-text">Cargando...</span></div>
</div>

<script>
const SUPABASE_URL = 'https://nhjmwmkaduiaifgztymi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oam13bWthZHVpYWlmZ3p0eW1pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODk3MTYsImV4cCI6MjA4ODE2NTcxNn0.p53BZPf6qygAYw29bIJ0bA5VwZ_lRxw-aocV8LuGB1c';
const app = document.getElementById('app');

async function supaFetch(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
  });
  if (!res.ok) { const b = await res.text().catch(()=>''); throw new Error(`${res.status}: ${b}`); }
  return res.json();
}

async function supaPost(path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(body),
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || e.hint || `Error ${res.status}`); }
  return res.json();
}

const getSlug = () => new URLSearchParams(window.location.search).get('n') || new URLSearchParams(window.location.search).get('slug') || '';
const formatDate = d => d.toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long' });
const toDateStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const durationLabel = min => min<60?`${min} min`:min===60?'1 hora':`${Math.floor(min/60)}h${min%60>0?` ${min%60}min`:''}`;

let state = {
  biz: null, services: [], hours: [],
  selectedService: null, selectedDate: new Date(), selectedSlot: null,
  takenSlots: [], loadingSlots: false,
  name: '', phone: '', notes: '', submitting: false, submitted: false,
};

async function init() {
  const slug = getSlug();
  if (!slug) { renderError('Link inválido', 'Este enlace no tiene un negocio asociado.'); return; }
  try {
    // ── Query 1: booking_links sin JOIN ──────────────────────────────────────
    const links = await supaFetch(`booking_links?slug=eq.${encodeURIComponent(slug)}&is_active=eq.true&select=id,user_id,require_approval`);
    if (!links || links.length === 0) { renderError('Negocio no encontrado', 'El enlace no está activo o no existe.'); return; }
    const link = links[0];

    // ── Query 2: business_profiles por user_id ───────────────────────────────
    const profiles = await supaFetch(`business_profiles?user_id=eq.${link.user_id}&select=business_name,business_type,logo_url,phone`);
    const profile = profiles?.[0] || {};

    state.biz = { ...profile, linkId: link.id, userId: link.user_id, requireApproval: link.require_approval };

    // ── Queries paralelas: servicios + horarios ──────────────────────────────
    const [services, hours] = await Promise.all([
      supaFetch(`services?user_id=eq.${link.user_id}&is_active=eq.true&order=name`),
      supaFetch(`business_hours?user_id=eq.${link.user_id}&order=day_of_week`),
    ]);
    state.services = services || [];
    state.hours = hours || [];
    state.selectedDate = findNextOpenDay(new Date());
    await loadTakenSlots();
    render();
  } catch (e) {
    console.error('[VYLTA]', e);
    renderError('Error de conexión', `No pudimos cargar la información. ${e.message}`);
  }
}

function findNextOpenDay(from) {
  let d = new Date(from);
  for (let i=0; i<14; i++) {
    const dow = d.getDay();
    const cfg = state.hours.find(h => h.day_of_week === dow);
    if (cfg ? cfg.is_open : (dow!==0 && dow!==6)) return d;
    d = addDays(d, 1);
  }
  return from;
}

async function loadTakenSlots() {
  state.loadingSlots = true;
  try {
    const apts = await supaFetch(`appointments?user_id=eq.${state.biz.userId}&date=eq.${toDateStr(state.selectedDate)}&status=not.in.(Cancelada,No-show,Rechazada)&select=start_time,end_time`);
    state.takenSlots = apts || [];
  } catch(e) { state.takenSlots = []; }
  state.loadingSlots = false;
}

function buildSlots() {
  const dow = state.selectedDate.getDay();
  const def = [{day_of_week:0,is_open:false},{day_of_week:1,is_open:true},{day_of_week:2,is_open:true},{day_of_week:3,is_open:true},{day_of_week:4,is_open:true},{day_of_week:5,is_open:true},{day_of_week:6,is_open:false}].map(d=>({...d,start_time:'09:00',end_time:'18:00'}));
  const cfg = state.hours.find(h=>h.day_of_week===dow) || def.find(h=>h.day_of_week===dow);
  if (!cfg || !cfg.is_open) return null;
  const [sh,sm] = cfg.start_time.split(':').map(Number);
  const [eh,em] = cfg.end_time.split(':').map(Number);
  const dur = state.selectedService ? Math.ceil(state.selectedService.duration_minutes/30)*30 : 30;
  const now = new Date(), isToday = toDateStr(state.selectedDate)===toDateStr(now);
  const slots = [];
  for (let t=sh*60+sm; t+dur<=eh*60+em; t+=30) {
    const label = `${Math.floor(t/60).toString().padStart(2,'0')}:${(t%60).toString().padStart(2,'0')}`;
    const taken = state.takenSlots.some(a => {
      const [as,ams]=(a.start_time||'00:00').split(':').map(Number);
      const [ae,ame]=(a.end_time||'00:00').split(':').map(Number);
      return t < ae*60+ame && t+dur > as*60+ams;
    });
    slots.push({ label, taken: taken || (isToday && t <= now.getHours()*60+now.getMinutes()) });
  }
  return slots;
}

function endTime(start, dur) {
  const [h,m]=start.split(':').map(Number), e=h*60+m+dur;
  return `${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;
}
const isBeforeToday = d => { const t=new Date(); t.setHours(0,0,0,0); const c=new Date(d); c.setHours(0,0,0,0); return c<t; };

function render() {
  if (state.submitted) { renderSuccess(); return; }
  const biz = state.biz;
  const initials = (biz.business_name||'N').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const slots = buildSlots();
  const canSubmit = state.selectedService && state.selectedSlot && state.name.trim() && state.phone.trim();
  const logoHtml = biz.logo_url ? `<img src="${biz.logo_url}" alt="" />` : initials;

  const servicesHtml = state.services.length === 0
    ? `<div style="padding:20px;text-align:center;color:#94A3B8;font-size:14px">Sin servicios publicados aún.</div>`
    : state.services.map(s => {
        const sel = state.selectedService?.id === s.id;
        return `<div class="service-item${sel?' selected':''}" onclick="selectService('${s.id}')">
          <div class="service-icon">✂️</div>
          <div class="service-info">
            <div class="service-name">${s.name}</div>
            <div class="service-meta">${durationLabel(s.duration_minutes)}${s.description?' · '+s.description:''}</div>
          </div>
          <div class="service-price">$${Number(s.price).toLocaleString('es-MX')}</div>
          ${sel?'<div class="service-check">✓</div>':''}
        </div>`;
      }).join('');

  let slotsHtml;
  if (state.loadingSlots) slotsHtml = `<div class="slots-empty">Cargando...</div>`;
  else if (!state.selectedService) slotsHtml = `<div class="slots-empty">Selecciona un servicio primero.</div>`;
  else if (!slots) slotsHtml = `<div class="closed-banner">🚫 Este día no hay atención. Prueba otra fecha.</div>`;
  else if (!slots.some(s=>!s.taken)) slotsHtml = `<div class="slots-empty">Sin horarios disponibles este día.</div>`;
  else slotsHtml = `<div class="slots-grid">${slots.map(s=>`<div class="slot${s.taken?' taken':''}${state.selectedSlot===s.label&&!s.taken?' selected':''}" onclick="${s.taken?'':'selectSlot(\''+s.label+'\')'}">${s.label}</div>`).join('')}</div>`;

  const summaryHtml = state.selectedService && state.selectedSlot ? `
    <div class="summary">
      <div class="summary-row"><span class="summary-key">Servicio</span><span class="summary-val">${state.selectedService.name}</span></div>
      <div class="summary-row"><span class="summary-key">Fecha</span><span class="summary-val">${formatDate(state.selectedDate)}</span></div>
      <div class="summary-row"><span class="summary-key">Hora</span><span class="summary-val">${state.selectedSlot} — ${endTime(state.selectedSlot, state.selectedService.duration_minutes)}</span></div>
      <div class="summary-row"><span class="summary-key">Total</span><span class="summary-price">$${Number(state.selectedService.price).toLocaleString('es-MX')} MXN</span></div>
    </div>` : '';

  app.innerHTML = `<div class="container">
    <div class="biz-header">
      <div class="biz-logo">${logoHtml}</div>
      <div class="biz-name">${biz.business_name||'Negocio'}</div>
      ${biz.business_type?`<div class="biz-type">${biz.business_type}</div>`:''}
      <div class="biz-badge"><div class="biz-badge-dot"></div>Acepta citas en línea</div>
    </div>
    <div class="section-title">1. Elige un servicio</div>
    <div class="card">${servicesHtml}</div>
    <div class="section-title">2. Elige fecha y hora</div>
    <div class="card">
      <div class="date-nav">
        <button class="date-btn" onclick="changeDate(-1)" ${isBeforeToday(addDays(state.selectedDate,-1))?'disabled':''}>‹</button>
        <span class="date-label" style="text-transform:capitalize">${formatDate(state.selectedDate)}</span>
        <button class="date-btn" onclick="changeDate(1)">›</button>
      </div>
      ${slotsHtml}
    </div>
    <div class="section-title">3. Tus datos</div>
    <div class="card"><div class="form-body">
      <div class="form-field"><label>Tu nombre *</label><input type="text" placeholder="Ej: María López" value="${state.name}" oninput="state.name=this.value" /></div>
      <div class="form-field"><label>Tu WhatsApp / teléfono *</label><input type="tel" placeholder="Ej: 442 123 4567" value="${state.phone}" oninput="state.phone=this.value" /></div>
      <div class="form-field"><label>Notas (opcional)</label><textarea placeholder="Primera vez, cabello corto..." oninput="state.notes=this.value">${state.notes}</textarea></div>
    </div></div>
    ${summaryHtml}
    <button class="submit-btn" onclick="submitBooking()" ${(!canSubmit||state.submitting)?'disabled':''}>${state.submitting?'Enviando...':'Solicitar cita →'}</button>
    <div class="powered">Agendas gestionadas con <span>VYLTA</span></div>
  </div>`;
}

async function selectService(id) { state.selectedService=state.services.find(s=>s.id===id)||null; state.selectedSlot=null; render(); }
async function changeDate(delta) {
  const next = addDays(state.selectedDate, delta);
  if (isBeforeToday(next)) return;
  state.selectedDate=next; state.selectedSlot=null; state.loadingSlots=true; render();
  await loadTakenSlots(); render();
}
function selectSlot(label) {
  state.selectedSlot=label; render();
  setTimeout(()=>{ const els=document.querySelectorAll('.section-title'); if(els[2]) els[2].scrollIntoView({behavior:'smooth',block:'start'}); },100);
}

async function submitBooking() {
  if (state.submitting) return;
  const {selectedService:svc,selectedSlot:slot,selectedDate:date,name,phone,notes,biz} = state;
  if (!svc||!slot||!name.trim()||!phone.trim()) return;
  state.submitting=true; render();
  try {
    await supaPost('appointments', {
      user_id: biz.userId, client_name_temp: name.trim(),
      service_name: svc.name, date: toDateStr(date),
      start_time: slot, end_time: endTime(slot, svc.duration_minutes),
      status: biz.requireApproval?'Solicitud':'Confirmada',
      notes: notes.trim()||null, service_cost: svc.price,
      source: 'public_link', whatsapp_notification: true,
    });
    state.submitted=true; render();
  } catch(e) { state.submitting=false; render(); alert('Error al enviar: '+e.message); }
}

function renderError(title, desc) {
  app.innerHTML=`<div class="error-screen"><div class="error-icon">🔍</div><div class="error-title">${title}</div><div class="error-desc">${desc}</div></div>`;
}
function renderSuccess() {
  const {selectedService:svc,selectedSlot:slot,selectedDate:date,name,biz}=state;
  app.innerHTML=`<div class="success-screen">
    <div class="success-icon">${biz.requireApproval?'⏳':'✅'}</div>
    <div class="success-title">${biz.requireApproval?'Solicitud enviada':'¡Cita confirmada!'}</div>
    <div class="success-desc">${biz.requireApproval?`Tu solicitud fue enviada a <strong>${biz.business_name}</strong>. Te contactarán para confirmar.`:`Tu cita con <strong>${biz.business_name}</strong> está confirmada.`}</div>
    <div class="success-card">
      <div class="success-card-row"><span class="success-card-key">Nombre</span><span class="success-card-val">${name}</span></div>
      <div class="success-card-row"><span class="success-card-key">Servicio</span><span class="success-card-val">${svc.name}</span></div>
      <div class="success-card-row"><span class="success-card-key">Fecha</span><span class="success-card-val" style="text-transform:capitalize">${formatDate(date)}</span></div>
      <div class="success-card-row"><span class="success-card-key">Hora</span><span class="success-card-val">${slot}</span></div>
      <div class="success-card-row"><span class="summary-key">Total</span><span class="success-card-val" style="color:#10B981;font-size:18px">$${Number(svc.price).toLocaleString('es-MX')} MXN</span></div>
    </div>
    ${biz.phone?`<div class="whatsapp-hint">📱 Guarda el número: <strong>${biz.phone}</strong></div>`:''}
    <div class="powered">Agendas gestionadas con <span>VYLTA</span></div>
  </div>`;
}

init();
</script>
</body>
</html>
